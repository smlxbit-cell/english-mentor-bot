{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}English Mentor Bot{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="logo" href="{% url 'core:home' %}">
                English Mentor Bot
            </a>

            <nav class="main-nav">
                <a href="{% url 'core:home' %}">Главная</a>
                <a href="{% url 'learning:word_list' %}">Слова</a>
                <a href="#">Практика</a>
                <a href="#">AI-помощник</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>English Mentor Bot © 2026</p>
        </div>
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
